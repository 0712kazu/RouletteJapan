<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f6f2ea">
    <meta name="description" content="市区町村の形から名前を当てる、地図ルーレットゲーム">
    <title>市区町村ルーレット</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap"
    >
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    >
    <link rel="stylesheet" href="css/styles.css">
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div class="title-block">
          <p class="eyebrow">MAP QUIZ</p>
          <h1><span class="title-accent">市区町村</span><span>ルーレット</span></h1>
          <p class="lead">赤く光るまちの名前を、制限時間内に当てよう。</p>
        </div>
        <!-- Music機能を復元する場合は、このコメントを外してください。
        <button id="sound-button" class="icon-button" type="button" aria-pressed="false" aria-label="音をオンにする">
          <span aria-hidden="true">🔇</span>
        </button>
        -->
      </header>

      <section class="game-panel" aria-labelledby="game-heading">
        <div class="game-copy">
          <p id="game-heading" class="status-label">READY</p>
          <div id="roulette" class="roulette" aria-live="polite">準備ができました</div>
          <div id="answer" class="answer" aria-live="assertive"></div>
        </div>

        <div class="controls">
          <label class="prefecture-filter" for="prefecture-select">
            <span>出題範囲</span>
            <select id="prefecture-select">
              <option value="all">全国</option>
            </select>
          </label>
          <label class="time-filter" for="time-select">
            <span>制限時間</span>
            <select id="time-select">
              <option value="5" selected>5秒</option>
              <option value="10">10秒</option>
              <option value="20">20秒</option>
            </select>
          </label>
          <button id="auto-button" class="auto-button" type="button" aria-pressed="false">
            <span>AUTO</span>
            <span class="auto-state">OFF</span>
          </button>
          <button id="start-button" class="start-button" type="button">スタート</button>
        </div>

        <div id="countdown" class="countdown" aria-live="off" aria-hidden="true"></div>
      </section>

      <section class="map-panel" aria-label="出題される市区町村の地図">
        <div id="map" role="application" aria-label="日本の市区町村地図"></div>
        <button id="reset-map-button" class="map-reset" type="button">日本全体</button>
        <div class="round-progress" aria-label="出題履歴">
          <span id="progress-text">0問出題</span>
          <button id="reset-history-button" class="text-button" type="button">履歴をリセット</button>
        </div>
      </section>

      <footer>
        <p>
          境界データ：国土交通省「国土数値情報（行政区域データ）」を加工して作成。
          データは表示用に簡略化しています。
        </p>
      </footer>
    </main>

    <script src="js/roulette.js"></script>
  </body>
</html>
